<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #0a0908; padding: 30px; display: flex; flex-direction: column; gap: 22px; }
</style>
</head>
<body>
  <div class="gr-wordmark">
    <span class="gr-diamond gr-diamond--glow gr-torch"></span>
    <span class="gr-wordmark__type">GRIMOIRE</span>
    <span class="gr-wordmark__tag">Table Companion</span>
  </div>
  <div class="gr-divider" style="max-width:360px"><span class="gr-diamond gr-diamond--sm"></span><span class="gr-diamond gr-diamond--outline"></span><span class="gr-diamond gr-diamond--sm"></span></div>
  <div style="font-family:var(--font-mono);font-size:10.5px;letter-spacing:.06em;color:#6b6350;line-height:1.7">Pirata One caps + a torch-lit diamond. No raster logo exists;<br>render the name in type wherever a mark is needed.</div>
</body>
</html>
