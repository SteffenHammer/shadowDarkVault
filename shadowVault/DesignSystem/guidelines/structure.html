<!-- @dsCard group="Spacing" viewport="700x210" subtitle="Sharp corners, 1px borders, deep soft shadows" name="Borders & elevation" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #0a0908; padding: 26px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; align-items: start; }
  .box { height: 96px; display: flex; align-items: flex-end; padding: 10px; }
  .cap { font-family: var(--font-mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: #8f8674; }
</style>
</head>
<body>
  <div class="grid">
    <div class="box" style="border:1px solid rgba(236,231,219,.16);background:#141110"><span class="cap">border · 1px</span></div>
    <div class="box" style="border:1px solid rgba(236,231,219,.28);background:#141110"><span class="cap">border · strong</span></div>
    <div class="box" style="background:#141110;box-shadow:0 20px 50px rgba(0,0,0,.5)"><span class="cap">shadow · panel</span></div>
    <div class="box" style="background:transparent;border:1px solid #ece7db;box-shadow:inset 0 0 0 3px rgba(236,231,219,.14)"><span class="cap" style="color:#ece7db">inset ring</span></div>
  </div>
  <p style="font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:#6b6350;margin:18px 0 0">--radius: 0 — nothing is rounded. Structure reads through borders and shadow, never glows.</p>
</body>
</html>
