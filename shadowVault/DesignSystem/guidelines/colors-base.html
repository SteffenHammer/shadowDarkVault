<!-- @dsCard group="Colors" viewport="700x250" subtitle="Shadowdark base — warm ink, parchment, muted tan ladder" name="Base palette" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: #0a0908; padding: 22px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border: 1px solid rgba(236,231,219,.16); }
  .sw__chip { height: 62px; }
  .sw__meta { padding: 8px 10px; font-family: var(--font-mono); }
  .sw__name { font-size: 11px; letter-spacing: .04em; color: #ece3d2; }
  .sw__hex { font-size: 10px; letter-spacing: .06em; color: #8f8674; margin-top: 3px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="sw__chip" style="background:#0a0908"></div><div class="sw__meta"><div class="sw__name">--bg</div><div class="sw__hex">#0a0908</div></div></div>
    <div class="sw"><div class="sw__chip" style="background:#141110"></div><div class="sw__meta"><div class="sw__name">--panel</div><div class="sw__hex">#141110</div></div></div>
    <div class="sw"><div class="sw__chip" style="background:#ece3d2"></div><div class="sw__meta"><div class="sw__name">--text</div><div class="sw__hex">#ece3d2</div></div></div>
    <div class="sw"><div class="sw__chip" style="background:#ece7db"></div><div class="sw__meta"><div class="sw__name">--accent</div><div class="sw__hex">#ece7db</div></div></div>
    <div class="sw"><div class="sw__chip" style="background:#a1977f"></div><div class="sw__meta"><div class="sw__name">--muted</div><div class="sw__hex">#a1977f</div></div></div>
    <div class="sw"><div class="sw__chip" style="background:#0a0908;box-shadow:inset 0 0 0 1px rgba(236,231,219,.16)"></div><div class="sw__meta"><div class="sw__name">--border</div><div class="sw__hex">rgba(236,231,219,.16)</div></div></div>
    <div class="sw"><div class="sw__chip" style="background:#c06a55"></div><div class="sw__meta"><div class="sw__name">--danger</div><div class="sw__hex">#c06a55</div></div></div>
    <div class="sw"><div class="sw__chip gr-media"></div><div class="sw__meta"><div class="sw__name">art fill</div><div class="sw__hex">striped placeholder</div></div></div>
  </div>
</body>
</html>
